# This file should be placed in the open source repository TinaIDE at .github/workflows/receive-release.yml
# Please copy this content to the open source repository

name: Receive and Publish Release

on:
  repository_dispatch:
    types: [pro-release]
  
  # Allow manual trigger (for testing)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use PAT token for checkout to ensure push permissions
          token: ${{ secrets.PRO_REPO_TOKEN }}
          fetch-depth: 0
      
      - name: Display release info
        run: |
          echo "## Release Info" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "- **Event**: repository_dispatch (from tinaide-pro)" >> $GITHUB_STEP_SUMMARY
            echo "- **Version**: ${{ github.event.client_payload.version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Version Name**: ${{ github.event.client_payload.version_name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Run ID**: ${{ github.event.client_payload.run_id }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Source Repo**: ${{ github.event.client_payload.pro_repo }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Commit SHA**: ${{ github.event.client_payload.sha }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Event**: workflow_dispatch (manual)" >> $GITHUB_STEP_SUMMARY
            echo "- **Version**: ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          fi
      
      # Download APK from tinaide-pro artifacts
      - name: Download artifact from pro repo
        if: github.event_name == 'repository_dispatch'
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.PRO_REPO_TOKEN }}
          repo: ${{ github.event.client_payload.pro_repo }}
          run_id: ${{ github.event.client_payload.run_id }}
          name: release-apk
          path: ./release
      
      - name: List downloaded files
        id: list_files
        run: |
          echo "Downloaded files:"
          ls -la ./release/ || echo "No release directory"
          
          # Detect available APK files
          ARM64_APK=$(find ./release -name "*arm64-v8a*.apk" 2>/dev/null | head -1)
          X86_APK=$(find ./release -name "*x86_64*.apk" 2>/dev/null | head -1)
          
          if [ -n "$ARM64_APK" ]; then
            ARM64_SIZE=$(du -h "$ARM64_APK" | cut -f1)
            echo "arm64_apk=$(basename $ARM64_APK)" >> $GITHUB_OUTPUT
            echo "arm64_size=$ARM64_SIZE" >> $GITHUB_OUTPUT
          fi
          
          if [ -n "$X86_APK" ]; then
            X86_SIZE=$(du -h "$X86_APK" | cut -f1)
            echo "x86_apk=$(basename $X86_APK)" >> $GITHUB_OUTPUT
            echo "x86_size=$X86_SIZE" >> $GITHUB_OUTPUT
          fi
      
      # Set version variables
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "tag=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "name=${{ github.event.client_payload.version_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "name=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi
      
      # Decode and generate Release Notes (including changelog from private repo)
      - name: Generate Release Notes
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          VERSION="${{ steps.version.outputs.tag }}"
          
          # Decode changelog content (base64 encoded content from private repo)
          CHANGELOG_CONTENT=""
          if [ "${{ github.event_name }}" == "repository_dispatch" ] && [ -n "${{ github.event.client_payload.changelog_base64 }}" ]; then
            CHANGELOG_CONTENT=$(echo "${{ github.event.client_payload.changelog_base64 }}" | base64 -d)
          fi
          
          # If no changelog content, use default text
          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT="No release notes available"
          fi
          
          # Get APK file information
          ARM64_APK="${{ steps.list_files.outputs.arm64_apk }}"
          ARM64_SIZE="${{ steps.list_files.outputs.arm64_size }}"
          X86_APK="${{ steps.list_files.outputs.x86_apk }}"
          X86_SIZE="${{ steps.list_files.outputs.x86_size }}"
          
          cat > release_notes.md << EOF
          ## TinaIDE ${VERSION}
          
          ### 📥 Download
          
          Please select the APK file that matches your device architecture:
          
          | File | Architecture | Size | Target Devices |
          |------|--------------|------|----------------|
          EOF
          
          # Add arm64-v8a APK info
          if [ -n "$ARM64_APK" ]; then
            cat >> release_notes.md << EOF
          | \`${ARM64_APK}\` | arm64-v8a | ${ARM64_SIZE} | 📱 **Most modern phones** (Recommended) |
          EOF
          fi
          
          # Add x86_64 APK info
          if [ -n "$X86_APK" ]; then
            cat >> release_notes.md << EOF
          | \`${X86_APK}\` | x86_64 | ${X86_SIZE} | 💻 Chromebook / Emulator |
          EOF
          fi
          
          cat >> release_notes.md << EOF
          
          ### 🤔 Which version should I download?
          
          - **arm64-v8a**: For 99% of modern Android phones (most phones released after 2016 use this architecture)
          - **x86_64**: For Chromebooks, Intel-based tablets, and Android emulators
          
          > 💡 **Not sure which one to choose?** Just download the **arm64-v8a** version - it's the most common architecture.
          
          ### 📱 System Requirements
          
          - Android 9.0 (API 28) or higher
          - Storage: ~500MB (after installation)
          
          ### 🔧 Installation Guide
          
          1. Download the APK file for your device architecture
          2. Enable "Install from unknown sources" on your Android device
          3. Open the APK file to install
          
          ### 📝 What's New
          
          EOF
          
          # Append changelog content
          echo "$CHANGELOG_CONTENT" >> release_notes.md
          
          cat >> release_notes.md << EOF
          
          ---
          
          > 🤖 This release was automatically built and published by CI/CD
          >
          > Build time: ${BUILD_TIME}
          EOF
          
          echo "Generated release notes:"
          cat release_notes.md
      
      # Check if tag already exists
      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      # Create tag (if not exists)
      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
      
      # Create GitHub Release
      # Note: Source code (zip/tar.gz) is auto-generated by GitHub and cannot be disabled
      # We use make_latest to ensure the APK is prominently displayed
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TinaIDE ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'rc') || contains(steps.version.outputs.tag, 'dev') }}
          make_latest: true
          files: |
            ./release/*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      
      - name: Release Summary
        run: |
          echo "## ✅ Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release URL**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Published APKs" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|------|------|" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.list_files.outputs.arm64_apk }}" ]; then
            echo "| arm64-v8a | ${{ steps.list_files.outputs.arm64_apk }} | ${{ steps.list_files.outputs.arm64_size }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.list_files.outputs.x86_apk }}" ]; then
            echo "| x86_64 | ${{ steps.list_files.outputs.x86_apk }} | ${{ steps.list_files.outputs.x86_size }} |" >> $GITHUB_STEP_SUMMARY
          fi
